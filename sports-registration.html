<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sports Registration Page</title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            max-width: 900px;
            margin:0 auto;
            padding:10px;

        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin: 6px 0 10px;
        }
        h2{
            margin: 10px 0 6px;
        }
        /* Style for the table */
        table {
            border-collapse: collapse;
            border: 1px solid #000;
            width: 100%;

        }
        th, td {
            border: 1px solid #000;
            padding: 6px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: rgb(255, 255, 255);
        }
       
        .row {
            display: grid;
            grid-template-columns:1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
            .square {
                grid-template-columns: 1fr;
            }
        }
        .field label{
            display: block;
            margin-bottom:6px;
            font-weight:700;
            font-size: 14px;
           
        }
        .field input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .field select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        fieldset {
            border: 1px solid #ccc;
            padding: 10px;
            margin:0;
            border-radius: 10px;
            min-width: 0;
        }
        fieldset legend {
            font-weight: 700;
            padding: 0 6px;
        }
       
        .square {
            display: grid;
            grid-template-columns: 1fr 1fr;    
            gap: 10px;
            margin-top:16px;
            margin-bottom: 16px;
        }
        .button {
            text-align: center;
            margin-top: 16px;
            display: flex;
            gap: 12px;
            flex-direction: column;
        }
        .button input{
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .button input[type="submit"] {
            background-color: #4CAF50;
            color: white;
        }
        .button input[type="reset"] {
            background-color: #808080;
            color: white;
        }   
        .button input[type="submit"]:hover {
                background-color: #074a0b;
        }
        .button input[type="reset"]:hover {
                background-color: #4d4d4d;
            }
    </style>
    
</head>
<body>
    <h1>Sports Registration Page</h1>
    <h2>Events</h2>    
    <table>
        <thead>
            <tr>
                <th>Event</th>
                <th>Date</th>
                <th>Time</th>
                <th>Location</th>
            </tr>
        </thead>
        <tbody>
        <tr>
            <td>Soccer Tournament</td>
            <td>2026-03-14</td>
            <td>3:00 PM</td>
            <td>Main Field</td>
        </tr>
        <tr>
            <td>Basketball Showcase</td>
            <td>2026-04-05</td>
            <td>6:30 PM</td>
            <td>Community Gym</td>
        </tr>
        <tr>
            <td>Triathlon</td>
            <td>2026-05-04</td>
            <td>9:00 AM</td>
            <td>Park </td>
        </tr>
        <tr>
            <td>Volleyball Tryouts</td>
            <td>2026-06-20</td>
            <td>4:00 PM</td>
            <td>East Courts</td>
        </tr>
        </tbody>
    </table>
    <h2>Registration Form</h2>
    <form method="post" action="#">
        <div class="row">
            <div class="field">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="field">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your@email.com" required>
            </div>
            <div class="field">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" min="16" max="80" placeholder="16 to 80">
            </div>
            <div class="field">
            <label for="country">Country:</label>
            <select id="country" name="country">
                <option value="usa">USA</option>
                <option value="canada">Canada</option>
                <option value="mexico">Mexico</option>
                <option value="uk">UK</option>
                <option value="australia">Australia</option>
            </select>
            </div>
            <div class="field">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password">
            </div>
                <div class="field">
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm">
            </div> 
            
        </div>
        <div class="square">
        <fieldset>
        <legend>Ticket Type:</legend>
        <label><input type="radio" name="ticket" value="1" required>Standard</label><br/>
        <label><input type="radio" name="ticket" value="2">VIP</label><br/>
        <label><input type="radio" name="ticket" value="3">Student</label><br/>
        </fieldset>
        <fieldset>
        <legend>Extra Options:</legend>
        <label><input type="checkbox" id="extra1" name="extra" value="1">Parking</label><br/>
        <label><input type="checkbox" id="extra2" name="extra" value="2">Meal</label><br/>
        <label><input type="checkbox" id="extra3" name="extra" value="3">Merchandise</label><br/>
        </fieldset>
        </div>
        <div class="row">
            <div class="field">
                <label for="date">Event Date:</label>
                <input type="date" id="date" name="date">
            </div>
            <div class="field">
                <label for="time">Event Time:</label>
                <input type="time" id="time" name="time">
            </div>
        </div>
        <div class="button">
            <input type="submit" value="Register">
            <input type="reset" value="Reset">
        </div>
    </form>
    <script>
    const password = document.getElementById("password");
    const confirm_password = document.getElementById("confirm_password");

    function validatePassword(){
        if (password.value !== confirm_password.value) {
        confirm_password.setCustomValidity("Passwords Don't Match");
        } else {
        confirm_password.setCustomValidity("");
        }
    }
    password.addEventListener("input", validatePassword);
    confirm_password.addEventListener("input", validatePassword);
    </script>
</body>
</html>
